<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Loot Hub</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
  margin:0;
  font-family:'Segoe UI', sans-serif;
  color:#fff;
  background:linear-gradient(-45deg,#000,#1a1a1a,#2a2a2a,#000);
  background-size:400% 400%;
  animation:bgMove 10s infinite linear;
}

@keyframes bgMove{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

.container{
  max-width:420px;
  margin:auto;
  padding:25px 20px;
  text-align:center;
  animation:fadeIn 1s ease;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(30px);}
  to{opacity:1; transform:translateY(0);}
}

/* LOGO */
.profile-img img{
  width:100px;
  height:100px;
  border-radius:50%;
  border:3px solid gold;
  box-shadow:0 0 20px gold;
}

/* USERNAME */
.username{
  font-size:28px;
  font-weight:bold;
  margin-top:10px;
  color:gold;
}

/* BIO */
.bio{
  font-size:15px;
  margin:10px 0 20px;
  color:#ccc;
}

/* ICONS */
.icons a{
  display:inline-block;
  margin:0 8px;
  font-size:18px;
  color:white;
  background:rgba(255,255,255,0.08);
  padding:10px;
  border-radius:50%;
  border:1px solid gold;
  backdrop-filter:blur(6px);
  transition:0.3s;
}

.icons a:hover{
  background:gold;
  color:black;
  transform:scale(1.15);
}

/* BUTTONS */
.link{
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(10px);
  border-radius:50px;
  padding:16px;
  margin:12px 0;
  font-size:17px;
  font-weight:600;
  border:1px solid rgba(255,215,0,0.5);
  cursor:pointer;
  transition:0.3s;
  animation:slideUp 0.6s ease;
}

@keyframes slideUp{
  from{opacity:0; transform:translateY(40px);}
  to{opacity:1; transform:translateY(0);}
}

.link:hover{
  background:gold;
  color:black;
  transform:scale(1.05);
  box-shadow:0 0 25px gold;
}

/* FOOTER */
.footer{
  margin-top:25px;
  font-size:12px;
  color:#777;
}

/* MOBILE APP FEEL */
@media (min-width:600px){
  .container{
    margin-top:40px;
    border-radius:20px;
    background:rgba(0,0,0,0.6);
    backdrop-filter:blur(12px);
    box-shadow:0 0 40px rgba(255,215,0,0.2);
  }
}

</style>
</head>

<body>

<div class="container">

  <div class="profile-img">

  <div class="username">@SmartLootHub</div>

    Limited Time Offers ⏳
  </div>

  <div class="icons">
    <a href="https://www.instagram.com/smartloot.hub/" target="_blank"><i class="fab fa-instagram"></i></a>
    <a href="https://whatsapp.com/channel/0029VbCjUN705MUdYgpcA31l" target="_blank"><i class="fab fa-whatsapp"></i></a>
    <a href="https://t.me/smartsloothub" target="_blank"><i class="fab fa-telegram"></i></a>
  </div>

  <div class="link" onclick="openLink('https://wa.me/91XXXXXXXXXX')">Old money outfit</div>
  <div class="link" onclick="openLink('https://instagram.com/your_id')">Beauty | perfume |</div>

  <div class="footer">© 2026 SmartLootHub</div>

</html>
